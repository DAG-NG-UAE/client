version: 0.0
os: linux

files:
  - source: /
    destination: /var/app/dag-client
    overwrite: true

permissions:
  - object: /var/app/dag-client
    owner: ec2-user
    group: ec2-user
    mode: "755"
    type:
      - directory
  - object: /var/app/dag-client
    owner: ec2-user
    group: ec2-user
    mode: "644"
    type:
      - file

hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 30
      runas: root

  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 60
      runas: ec2-user

  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: ec2-user
